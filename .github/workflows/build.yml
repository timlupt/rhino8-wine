name: Build Wine-Rhino

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: YOUR_CACHIX_CACHE_NAME
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build wine-rhino
        run: nix build .#wine-rhino --print-build-logs

      - name: Build all commands
        run: |
          nix build .#install-rhino --print-build-logs
          nix build .#run-rhino --print-build-logs
          nix build .#yak-rhino --print-build-logs
          nix build .#fix-ui-lag --print-build-logs
          nix build .#fix-black-menus --print-build-logs
