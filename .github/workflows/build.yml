name: Build Wine-Rhino

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: timlupt-rhino8-wine
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build wine-rhino
        run: nix build .#wine-rhino --print-build-logs

      - name: Build all commands
        run: |
          nix build .#rhino8 --print-build-logs
          nix build .#rhino8-install --print-build-logs
          nix build .#rhino8-uninstall --print-build-logs
          nix build .#rhino8-sync --print-build-logs
          nix build .#yak --print-build-logs
          nix build .#rhino8-analyze-crash --print-build-logs
